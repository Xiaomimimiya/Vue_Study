<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
       <!-- v-if 条件判断 设置为true -->
        <div v-if="isshow"> 哈哈</div>
        <!-- 动态切换 -->
        <button @click="toggle">显示切换</button>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    message: "hello world",
                    isshow: true
                }
            },
            methods: {
                toggle() {
                    // 取反 能够进行动态切换
                    this.isshow = !this.isshow
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
