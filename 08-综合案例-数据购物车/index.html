<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <linck rel="stylesheet" href="./style.css"></linck>
</head>

<body>

    <div id="app"></div>

    <template id="my-app">
     <template v-if="books.length>0">
        <table>
            <thead>
              <th>序号</th>
              <th>书籍名称</th>
              <th>出版日期</th>
              <th>价格</th>
              <th>购买数量</th>
              <th>操作</th>
            </thead>
            <tbody>
              <tr v-for="(book, index) in books">
                <td>{{index + 1}}</td>
                <td>{{book.name}}</td>
                <td>{{book.date}}</td>
                <td>{{formatePrice(book.price)}}</td>
                <td>
                    <!--  book.count <= 1 时就为false 则不能在继续点击了-->
                    <!-- 加索引是为了确定哪一本书 被定位到 -->
                    <button v-bind:disabled="book.count <= 1" @click="decrease(index)" >-</button>
                    <span class="counter">{{book.count}}</span>
                    <button @click="increase(index)">+</button>
                </td>
                <td>
                  <button @click="removeBook(index)">移除</button>
                </td>
              </tr>
            </tbody>
          </table>
          <!-- 使用计算属性 -->
          <h2>总价格:{{formatePrice(Sum_price)}}</h2>
     </template>
    <template v-else>
         <h2>购物车为空</h2>
     </template>
    </template>

    <script src="../js/vue.js"></script>
    <script src="./index.js"></script>

</body>

</html>
