<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
        <!-- 1.绑定textarea -->
    <label id="intro">
           自我介绍
           <textarea name="intro" id="intro" cols="30" rows="10" v-model="intro"></textarea>
       </label>
       <h2>{{intro}}</h2> 
       
       <!-- 2.绑定checkbox 点击文字改变label 是因为双向同时绑定-->
       <!-- 关于这个案例要注意添加 value="" -->
       <!-- 多选框 -->
    <label for="basktball">
           <input id="basktball" type="checkbox" v-model="sports" value="basktball">篮球
       </label>
    <label for="tennis">
        <input id="tennis" type="checkbox" v-model="sports" value="tennis">网球
        </label>
    <label for="football">
        <input id="football" type="checkbox" v-model="sports"value="football" >足球
         </label>
    <h2>{{sports}}</h2>

       <!-- 3.绑定radio -->
       <!-- radio 呈现互斥的结果 -->
       <label for="male">
           <input id="male" type="radio" v-model="gender" value="male">男
       </label>

       <label for="female">
        <input id="female" type="radio" v-model="gender" value="female">女
    </label>
    <h2>{{gender}}</h2>
    
       <!-- 4.绑定select -->
       <!-- 选择框 -->
       <span>喜欢的水果：</span>
       <select v-model="fruit" multiple size="3">
           <option value="apple">苹果</option>
           <option value="banana">香蕉</option>
           <option value="orange">橙子</option>
       </select>
        <h2>{{fruit}}</h2>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    intro: "hello world",
                    isAgree: false,
                    sports: [],
                    gender: "",
                    fruit: "apple"
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
