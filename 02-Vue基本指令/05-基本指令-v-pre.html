<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/vue.js"></script>
</head>

<body>
    <template id="my-app">
        <div>
            <!--v-pre 的功能在于 帮助我们去处理 我们不希望被渲染的元素-->
            <h2 v-pre>{{message}}</h2>
        </div>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    message: "hello world"
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
