<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <div id="app"></div>
    <script src="https://unpkg.com/vue@next"></script>
    <script>
        // 定义一个对象 传入到app中去
        const test_vue = {
            template: "<h2>Hello World</h2>",
        };
        // 传递对象
        const app = Vue.createApp(test_vue);

        // 直接 mount 挂载  不需要获取元素
        // const mounts = document.querySelector("#app");
        app.mount("#app");
    </script>
</body>

</html>
