<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
        <h1>电影列表</h1>
       <!-- 对于数组的基本使用 -->
        <ul>
            <!-- movie 可以自定义 -->
            <!-- movie 来自于我们定义的数组 -->
            <li v-for="movie in movies">
              {{movie}}  
            </li>
        </ul>

         <!-- 遍历对象 -->
         <ul>
             <!--获取下标数组 -->
            <li v-for="(movie,index) in movies" >
                <!-- 字符串拼接 -->
               {{index+1}}.{{movie}}  
            </li>
        </ul>

        <!-- 遍历属性 -->
        <h2>个人信息</h2>
        <ul>
            <!-- 名字都可以自定义 但是info不可以 -->
            <li v-for="(value,key,index) in info">
                {{index+1}}.{{value}}-{{key}}
            </li>
        </ul>
     
        <h2>遍历数字</h2>
            <ul>
                <!-- 遍历1-10 -->
                <li v-for="num in 10">{{num}}</li>
            </ul>
       
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    // 定义一个数组 对其进行渲染
                    movies: [
                        "小米123",
                        "xiaomi123",
                        "xiaoxiaomimi",
                    ],
                    // 定义一个对象 对其进行渲染
                    info: {
                        name: "xiaomi",
                        age: 18,
                        city: "Guangzhou"
                    }
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
