<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
       <!-- 属性直接绑定对象的示例 info -->
        <div v-bind="info">哈哈哈</div>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    info: {
                        name: "xiaomi",
                        age: 18,
                        city: "GuangZhou"
                    }
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
