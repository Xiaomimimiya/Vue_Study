<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
       <!-- 注意格式 -->
       <!-- 动态决定 -->
        <div :[name]="class_name">{{message}} </div>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    message: "hello world",
                    name: 'class',
                    class_name: "xiaomi"
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
