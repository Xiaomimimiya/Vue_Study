<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
        <!-- 数组  两个属性进行合并 得到结果-->
        <div :style="[styleobj1,styleobj2]"> 哈哈</div>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    message: "hello world",
                    styleobj1: {
                        fontSize: '50px',
                    },
                    styleobj2: {
                        backgroundColor: "yellow"
                    }
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
