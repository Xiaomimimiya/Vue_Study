<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="D:\vue_Study\js\vue.js"></script>
</head>

<body>
    <template id="my-app">
        <!-- 默认传入event对象 可以在方法中进行获取 -->
        <button @click="btnClick1">点击1</button>
       <!-- 调用event的方法 -->
       <!-- 必须加$event 才能够获取到 事件发生时的事件对象 -->
       <button @click="btnClick1($event,'xiaomi')">点击1</button>
       <button @click="btnClick2($event,'xiaomi',19)">点击2</button>
    </template>

    <div id="app"></div>

    <script>
        const app = {
            template: "#my-app",
            data() {
                return {
                    message: "hello world",
                }
            },
            methods: {
                btnClick1(event, name) {
                    console.log(name, event);
                },
                btnClick2(event, name, age) {
                    console.log(name, age, event);
                },
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>
